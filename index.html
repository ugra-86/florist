<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florist Assistant</title>
    <style>
        /* СИСТЕМА ТЕМ ОФОРМЛЕНИЯ */
        :root {
            --bg: #ffffff; --text: #333; --accent: #2ecc71; --card: #f9f9f9;
        }
        [data-theme="dark"] {
            --bg: #1a1a1a; --text: #f0f0f0; --accent: #27ae60; --card: #2d2d2d;
        }
        [data-theme="forest"] {
            --bg: #e8f5e9; --text: #1b5e20; --accent: #4caf50; --card: #c8e6c9;
        }
        [data-theme="lavender"] {
            --bg: #f3e5f5; --text: #4a148c; --accent: #9c27b0; --card: #e1bee7;
        }
        [data-theme="rose"] {
            --bg: #fce4ec; --text: #880e4f; --accent: #e91e63; --card: #f8bbd0;
        }

        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        
        .search-box { width: 100%; max-width: 400px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 20px; }
        
        .plant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .plant-card { background: var(--card); padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .plant-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        
        .badge-pro { background: orange; color: white; padding: 2px 5px; font-size: 10px; border-radius: 3px; position: absolute; top: 10px; right: 10px; }
        .favorite-btn { cursor: pointer; font-size: 20px; border: none; background: none; color: var(--accent); }
        
        .sidebar { position: fixed; right: 20px; top: 100px; background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--accent); }
        .hidden { display: none; }
        
        button { padding: 8px 12px; cursor: pointer; border-radius: 5px; border: none; background: var(--accent); color: white; }
        select { padding: 8px; border-radius: 5px; }
    </style>
</head>
<body data-theme="light">

<header>
    <h1 id="app-title">Помощник флориста</h1>
    <div class="controls">
        <select id="lang-select" onchange="changeLang()">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
        </select>
        <select id="theme-select" onchange="changeTheme()">
            <option value="light">Светлая</option>
            <option value="dark">Темная</option>
            <option value="forest">Лес</option>
            <option value="lavender">Лаванда</option>
            <option value="rose">Роза</option>
        </select>
        <button onclick="toggleVersion()" id="version-btn">Версия: Lite</button>
    </div>
</header>

<input type="text" class="search-box" id="search-input" placeholder="Поиск растений..." onkeyup="searchPlants()">

<div id="pro-notice" class="hidden" style="color: orange; margin-bottom: 10px;">PRO: Доступен поиск в интернете!</div>

<div class="plant-grid" id="plant-list">
    <!-- Сюда JavaScript вставит растения -->
</div>

<div class="sidebar">
    <h3 id="fav-title">Избранное</h3>
    <ul id="favorites-list"></ul>
    <div id="shop-links" class="hidden">
        <hr>
        <p id="shop-text">Купить в магазинах:</p>
        <a href="https://www.flowwow.com" target="_blank">FlowWow</a><br>
        <a href="https://www.obiru.ru" target="_blank">OBI</a><br>
        <a href="https://www.leroymerlin.ru" target="_blank">Leroy Merlin</a>
    </div>
</div>

<script>
    // БАЗА ДАННЫХ
    const plants = [
        { id: 1, name: {ru: "Алоэ Вера", en: "Aloe Vera", de: "Aloe Vera"}, group: "home", img: "https://images.unsplash.com/photo-1596547609652-9cf5d8d76921?auto=format&fit=crop&w=200" },
        { id: 2, name: {ru: "Роза Садовая", en: "Garden Rose", de: "Gartenrose"}, group: "garden", img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=200" },
        { id: 3, name: {ru: "Фикус", en: "Ficus", de: "Feigen"}, group: "home", img: "https://images.unsplash.com/photo-1597055181300-e3633a207519?auto=format&fit=crop&w=200" },
        { id: 4, name: {ru: "Пион", en: "Peony", de: "Pfingstrose"}, group: "garden", img: "https://images.unsplash.com/photo-1563241527-3004b7be0fab?auto=format&fit=crop&w=200" }
    ];

    // ПЕРЕВОДЫ
    const i18n = {
        ru: { title: "Помощник флориста", fav: "Избранное", shop: "Купить в магазинах", search: "Поиск растений..." },
        en: { title: "Florist Assistant", fav: "Favorites", shop: "Buy in shops", search: "Search plants..." },
        de: { title: "Floristen-Assistent", fav: "Favoriten", shop: "In Geschäften kaufen", search: "Pflanzen suchen..." }
    };

    let currentLang = 'ru';
    let isPro = false;
    let favorites = JSON.parse(localStorage.getItem('favs')) || [];

    function renderPlants() {
        const list = document.getElementById('plant-list');
        list.innerHTML = '';
        plants.forEach(p => {
            list.innerHTML += `
                <div class="plant-card">
                    <img src="${p.img}" alt="${p.name[currentLang]}">
                    <h4>${p.name[currentLang]}</h4>
                    <p>${p.group === 'home' ? '🏠' : '🌻'}</p>
                    <button class="favorite-btn" onclick="toggleFav(${p.id})">
                        ${favorites.includes(p.id) ? '❤️' : '🤍'}
                    </button>
                </div>
            `;
        });
    }

    function searchPlants() {
        const query = document.getElementById('search-input').value.toLowerCase();
        if (isPro && query.length > 3) {
            // Имитация поиска в интернете для PRO
            document.getElementById('pro-notice').classList.remove('hidden');
        }
        // Обычный фильтр
        const cards = document.querySelectorAll('.plant-card');
        cards.forEach(card => {
            const name = card.querySelector('h4').innerText.toLowerCase();
            card.style.display = name.includes(query) ? 'block' : 'none';
        });
    }

    function toggleFav(id) {
        if (favorites.includes(id)) {
            favorites = favorites.filter(fid => fid !== id);
        } else {
            favorites.push(id);
        }
        localStorage.setItem('favs', JSON.stringify(favorites));
        updateFavoritesUI();
        renderPlants();
    }

    function updateFavoritesUI() {
        const favList = document.getElementById('favorites-list');
        favList.innerHTML = '';
        favorites.forEach(fid => {
            const p = plants.find(plant => plant.id === fid);
            if (p) favList.innerHTML += `<li>${p.name[currentLang]}</li>`;
        });
        
        if (isPro && favorites.length > 0) {
            document.getElementById('shop-links').classList.remove('hidden');
        } else {
            document.getElementById('shop-links').classList.add('hidden');
        }
    }

    function changeTheme() {
        const theme = document.getElementById('theme-select').value;
        document.body.setAttribute('data-theme', theme);
    }

    function changeLang() {
        currentLang = document.getElementById('lang-select').value;
        document.getElementById('app-title').innerText = i18n[currentLang].title;
        document.getElementById('fav-title').innerText = i18n[currentLang].fav;
        document.getElementById('shop-text').innerText = i18n[currentLang].shop;
        document.getElementById('search-input').placeholder = i18n[currentLang].search;
        renderPlants();
        updateFavoritesUI();
    }

    function toggleVersion() {
        isPro = !isPro;
        document.getElementById('version-btn').innerText = isPro ? "Версия: PRO" : "Версия: Lite";
        alert(isPro ? "PRO активирована (10$)! Доступны ссылки на магазины и расширенный поиск." : "Переключено на Lite");
        updateFavoritesUI();
        searchPlants();
    }

    // Инициализация
    renderPlants();
    updateFavoritesUI();
</script>

</body>
</html>
