<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florist Assistant</title>
    <style>
        /* СИСТЕМА ТЕМ ОФОРМЛЕНИЯ */
        :root {
            --bg: #ffffff; --text: #333; --accent: #2ecc71; --card: #f9f9f9;
        }
        [data-theme="dark"] {
            --bg: #1a1a1a; --text: #f0f0f0; --accent: #27ae60; --card: #2d2d2d;
        }
        [data-theme="forest"] {
            --bg: #e8f5e9; --text: #1b5e20; --accent: #4caf50; --card: #c8e6c9;
        }
        [data-theme="lavender"] {
            --bg: #f3e5f5; --text: #4a148c; --accent: #9c27b0; --card: #e1bee7;
        }
        [data-theme="rose"] {
            --bg: #fce4ec; --text: #880e4f; --accent: #e91e63; --card: #f8bbd0;
        }

        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        
        .search-box { width: 100%; max-width: 400px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 20px; font-size: 16px; }
        
        .plant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .plant-card { background: var(--card); padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .plant-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        
        .badge-pro { background: orange; color: white; padding: 2px 5px; font-size: 10px; border-radius: 3px; position: absolute; top: 10px; right: 10px; }
        .favorite-btn { cursor: pointer; font-size: 24px; border: none; background: none; }
        
        .sidebar { position: sticky; top: 20px; background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--accent); margin-top: 20px; }
        .hidden { display: none; }
        
        button { padding: 8px 12px; cursor: pointer; border-radius: 5px; border: none; background: var(--accent); color: white; font-weight: bold; }
        select { padding: 8px; border-radius: 5px; cursor: pointer; }

        .shop-link { display: block; margin: 5px 0; color: var(--accent); text-decoration: none; font-weight: bold; }
        .shop-link:hover { text-decoration: underline; }

        @media (min-width: 768px) {
            .main-container { display: flex; gap: 30px; }
            .content { flex: 3; }
            .sidebar { flex: 1; height: fit-content; }
        }
    </style>
</head>
<body data-theme="light">

<header>
    <h1 id="app-title">Помощник флориста</h1>
    <div class="controls">
        <select id="lang-select" onchange="changeLang()">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
        </select>
        <select id="theme-select" onchange="changeTheme()">
            <option value="light">Светлая</option>
            <option value="dark">Темная</option>
            <option value="forest">Лес</option>
            <option value="lavender">Лаванда</option>
            <option value="rose">Роза</option>
        </select>
        <button onclick="toggleVersion()" id="version-btn">Версия: Lite</button>
    </div>
</header>

<div class="main-container">
    <div class="content">
        <input type="text" class="search-box" id="search-input" placeholder="Поиск растений..." onkeyup="searchPlants()">
        <div id="pro-notice" class="hidden" style="color: orange; font-weight: bold; margin-bottom: 15px;">PRO: Выполняется поиск в глобальной сети...</div>
        <div class="plant-grid" id="plant-list">
            <!-- Сюда JavaScript вставит растения -->
        </div>
    </div>

    <div class="sidebar">
        <h3 id="fav-title">Избранное</h3>
        <ul id="favorites-list"></ul>
        <div id="shop-links" class="hidden">
            <hr>
            <p id="shop-text">Купить в магазинах:</p>
            <a href="https://www.ozon.ru/category/semena-rasteniya-i-tsvety-14501/" class="shop-link" target="_blank">OZON</a>
            <a href="https://www.wildberries.ru/catalog/dom/dacha-i-sad/semena-i-sazhentsy" class="shop-link" target="_blank">Wildberries</a>
            <a href="https://semena.ru" class="shop-link" target="_blank">Semena.ru</a>
        </div>
    </div>
</div>

<script>
    // БАЗА ДАННЫХ
    const plants = [
        { id: 1, name: {ru: "Алоэ Вера", en: "Aloe Vera", de: "Aloe Vera"}, group: "home", img: "https://images.unsplash.com/photo-1596547609652-9cf5d8d76921?auto=format&fit=crop&w=300" },
        { id: 2, name: {ru: "Роза Садовая", en: "Garden Rose", de: "Gartenrose"}, group: "garden", img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=300" },
        { id: 3, name: {ru: "Фикус Бенджамина", en: "Ficus Benjamina", de: "Birkenfeige"}, group: "home", img: "https://images.unsplash.com/photo-1597055181300-e3633a207519?auto=format&fit=crop&w=300" },
        { id: 4, name: {ru: "Пион Розовый", en: "Pink Peony", de: "Rosa Pfingstrose"}, group: "garden", img: "https://images.unsplash.com/photo-1563241527-3004b7be0fab?auto=format&fit=crop&w=300" },
        { id: 5, name: {ru: "Сансевиерия", en: "Snake Plant", de: "Bogenhanf"}, group: "home", img: "https://images.unsplash.com/photo-1599599810694-b5b37304c041?auto=format&fit=crop&w=300" },
        { id: 6, name: {ru: "Бархатцы", en: "Marigold", de: "Tagetes"}, group: "garden", img: "https://images.unsplash.com/photo-1588625500500-6c905333550c?auto=format&fit=crop&w=300" }
    ];

    // ПЕРЕВОДЫ
    const i18n = {
        ru: { title: "Помощник флориста", fav: "Избранное", shop: "Купить в магазинах:", search: "Поиск растений..." },
        en: { title: "Florist Assistant", fav: "Favorites", shop: "Buy in shops:", search: "Search plants..." },
        de: { title: "Floristen-Assistent", fav: "Favoriten", shop: "In Geschäften kaufen:", search: "Pflanzen suchen..." }
    };

    let currentLang = 'ru';
    let isPro = false;
    let favorites = JSON.parse(localStorage.getItem('favs_florist')) || [];

    function renderPlants() {
        const list = document.getElementById('plant-list');
        list.innerHTML = '';
        plants.forEach(p => {
            const isFav = favorites.includes(p.id);
            list.innerHTML += `
                <div class="plant-card">
                    <img src="${p.img}" alt="${p.name[currentLang]}">
                    <h4>${p.name[currentLang]}</h4>
                    <p>${p.group === 'home' ? '🏠 Комнатное' : '🌻 Садовое'}</p>
                    <button class="favorite-btn" onclick="toggleFav(${p.id})">
                        ${isFav ? '❤️' : '🤍'}
                    </button>
                </div>
            `;
        });
    }

    function searchPlants() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const notice = document.getElementById('pro-notice');
        
        if (isPro && query.length > 2) {
            notice.classList.remove('hidden');
        } else {
            notice.classList.add('hidden');
        }

        const cards = document.querySelectorAll('.plant-card');
        cards.forEach(card => {
            const name = card.querySelector('h4').innerText.toLowerCase();
            card.style.display = name.includes(query) ? 'block' : 'none';
        });
    }

    function toggleFav(id) {
        if (favorites.includes(id)) {
            favorites = favorites.filter(fid => fid !== id);
        } else {
            favorites.push(id);
        }
        localStorage.setItem('favs_florist', JSON.stringify(favorites));
        updateFavoritesUI();
        renderPlants();
    }

    function updateFavoritesUI() {
        const favList = document.getElementById('favorites-list');
        favList.innerHTML = '';
        favorites.forEach(fid => {
            const p = plants.find(plant => plant.id === fid);
            if (p) favList.innerHTML += `<li>${p.name[currentLang]}</li>`;
        });
        
        const shopLinks = document.getElementById('shop-links');
        // Показываем ссылки только в PRO и если есть избранное
        if (isPro && favorites.length > 0) {
            shopLinks.classList.remove('hidden');
        } else {
            shopLinks.classList.add('hidden');
        }
    }

    function changeTheme() {
        const theme = document.getElementById('theme-select').value;
        document.body.setAttribute('data-theme', theme);
    }

    function changeLang() {
        currentLang = document.getElementById('lang-select').value;
        document.getElementById('app-title').innerText = i18n[currentLang].title;
        document.getElementById('fav-title').innerText = i18n[currentLang].fav;
        document.getElementById('shop-text').innerText = i18n[currentLang].shop;
        document.getElementById('search-input').placeholder = i18n[currentLang].search;
        renderPlants();
        updateFavoritesUI();
    }

    function toggleVersion() {
        isPro = !isPro;
        document.getElementById('version-btn').innerText = isPro ? "Версия: PRO" : "Версия: Lite";
        document.getElementById('version-btn').style.background = isPro ? "orange" : "var(--accent)";
        
        if(isPro) {
            alert("PRO-версия активирована! Доступны ссылки на OZON, Wildberries и Semena.ru в разделе избранного.");
        }
        
        updateFavoritesUI();
    }

    // Инициализация
    renderPlants();
    updateFavoritesUI();
</script>

</body>
</html>
